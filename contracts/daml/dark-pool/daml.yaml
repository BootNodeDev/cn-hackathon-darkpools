# SDK pinned to 3.4.11 / LF target 2.1 to match the vendored Splice deps and the
# test harness; this lets dark-pool-test data-depend on this DAR directly.
sdk-version: 3.4.11
name: dark-pool
source: daml
version: 0.0.1
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies:
  # paths are relative to this package dir; ../../ is the repo root.
  # PRODUCTION DEPENDS ONLY ON THE FOUR TOKEN-STANDARD API DARS. No Splice/Amulet.
  - ../../deps/splice-daml/dars/splice-api-token-metadata-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-holding-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-instruction-v1-1.0.0.dar
build-options:
  - --target=2.1
