# Production minimal-registry token package. Same SDK/LF as dark-pool so its DAR
# is consumed directly by registry-token-test (and uploaded to the ledger out of
# band). PRODUCTION DEPENDS ONLY ON THE TOKEN-STANDARD API DARS. No daml-script,
# no Amulet, no test harness.
sdk-version: 3.4.11
name: registry-token
source: daml
version: 0.0.1
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies:
  # paths are relative to this package dir; ../../ is the repo root.
  - ../../deps/splice-daml/dars/splice-api-token-metadata-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-holding-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-instruction-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-transfer-instruction-v1-1.0.0.dar
build-options:
  - --target=2.1
