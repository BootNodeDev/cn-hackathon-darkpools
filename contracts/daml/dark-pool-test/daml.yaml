sdk-version: 3.4.11
name: dark-pool-test
source: daml
version: 0.0.1
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  # our production package (same SDK/LF, so the DAR is consumed directly)
  - ../dark-pool/.daml/dist/dark-pool-0.0.1.dar
  # amulet model + token-standard APIs (already compiled, shipped in deps)
  - ../../deps/splice-daml/dars/splice-amulet-0.1.19.dar
  - ../../deps/splice-daml/dars/splice-api-token-metadata-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-holding-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-instruction-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-allocation-request-v1-1.0.0.dar
  - ../../deps/splice-daml/dars/splice-api-token-transfer-instruction-v1-1.0.0.dar
  # the token-standard test harness built by scripts/build-harness.sh, referenced
  # by the stable *-current.dar alias the script emits. The harness version
  # (currently 1.0.14) lives only in upstream's daml.yaml; it bumps with the
  # splice tag with no path here to keep in sync.
  - ../../deps/token-standard/splice-token-standard-test/.daml/dist/splice-token-standard-test-current.dar
build-options:
  # LF 2.1 resolves the SAME daml-script the harness embeds (package-id
  # d6ae29f2); the default 2.2 resolves a different one and fails.
  - --target=2.1
