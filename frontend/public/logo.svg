<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cn-darkpools">
  <defs>
    <radialGradient id="dp-core" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="55%" stop-color="#2DD4FF"/>
      <stop offset="100%" stop-color="#0A6E8C"/>
    </radialGradient>
    <linearGradient id="dp-depth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36E0FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0B1A2A" stop-opacity="0.05"/>
    </linearGradient>
    <clipPath id="dp-clip"><rect x="0" y="0" width="120" height="120" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#dp-clip)">
    <rect width="120" height="120" rx="28" fill="#080B11"/>
    <rect width="120" height="120" rx="28" fill="url(#dp-depth)" opacity="0.10"/>

    <!-- ripple rings: full on top (surface), fading/broken on the lower half (hidden depth) -->
    <g stroke="url(#dp-depth)" fill="none" stroke-linecap="round">
      <circle cx="60" cy="52" r="40" stroke-width="2.5" opacity="0.30"/>
      <circle cx="60" cy="52" r="29" stroke-width="2.5" opacity="0.55"/>
      <circle cx="60" cy="52" r="18" stroke-width="2.5" opacity="0.85"/>
    </g>

    <!-- depth horizon: the surface line of the pool -->
    <path d="M14 52 H106" stroke="#36E0FF" stroke-width="1.25" opacity="0.35"/>

    <!-- descending node (an order dropping into the dark) -->
    <circle cx="60" cy="52" r="7.5" fill="url(#dp-core)"/>
    <circle cx="60" cy="52" r="7.5" fill="none" stroke="#7DF9FF" stroke-width="1" opacity="0.6"/>
    <path d="M60 60 V92" stroke="url(#dp-depth)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="60" cy="92" r="3" fill="#1FA9D6" opacity="0.8"/>
  </g>
</svg>
